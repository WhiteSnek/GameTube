name: Deploy GameTube Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: PROD

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Download Go dependencies
        run: go mod download

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Prisma CLI
        run: npm install -g prisma@6.3.1

      - name: Generate Prisma Client
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PRISMA_CLI_BINARY_TARGETS: linux-arm64-openssl-3.0.x
        run: |
          go run github.com/steebchen/prisma-client-go generate

      - name: Apply Prisma Migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          go run github.com/steebchen/prisma-client-go migrate deploy

      - name: Locate Prisma Query Engine
        run: |
          ENGINE=$(find "$HOME" -type f -name "query-engine*" | head -n 1)

          if [ -z "$ENGINE" ]; then
            echo "No Prisma query engine found!"
            exit 1
          fi

          echo "Found engine: $ENGINE"
          echo "ENGINE_PATH=$ENGINE" >> $GITHUB_ENV

      - name: Build Lambda binary
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: arm64
        run: |
          go build -ldflags="-s -w" -o bootstrap .

      - name: Prepare deployment package
        run: |
          mkdir package

          cp bootstrap package/

          mkdir -p package/prisma
          cp prisma/schema.prisma package/prisma/
          cp -r prisma/migrations package/prisma/
          cp -r prisma/db package/prisma/db/

          mkdir -p package/prisma/binaries

          cp "$ENGINE_PATH" package/prisma/binaries/query-engine

          chmod +x package/prisma/binaries/query-engine

      - name: Verify package
        run: |
          find package -type f

      - name: Create deployment package
        run: |
          cd package
          zip -r ../lambda.zip .

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload deployment package
        run: |
          aws s3 cp lambda.zip s3://${{ secrets.DEPLOYMENT_BUCKET }}/lambda.zip

      - name: Deploy Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --s3-bucket ${{ secrets.DEPLOYMENT_BUCKET }} \
            --s3-key lambda.zip
      - name: Wait for code deployment
        run: |
          aws lambda wait function-updated \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }}

      - name: Configure Prisma Engine Path
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --environment "Variables={PRISMA_QUERY_ENGINE_BINARY=/var/task/prisma/binaries/query-engine}"

      - name: Wait for deployment
        run: |
          aws lambda wait function-updated \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }}